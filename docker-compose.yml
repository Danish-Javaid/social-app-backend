version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: social_media_postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: social_media_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      - "CMD-SHELL"
      - "pg_isready -U devuser -d social_media_dev"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
